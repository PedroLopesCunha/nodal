production:
  erp_scheduled_sync_hourly:
    class: ErpScheduledSyncJob
    queue: erp_sync
    args: [ "hourly" ]
    schedule: "0 * * * *"
    description: "Run hourly ERP sync for organisations with hourly frequency"

  erp_scheduled_sync_daily:
    class: ErpScheduledSyncJob
    queue: erp_sync
    args: [ "daily" ]
    schedule: "0 2 * * *"
    description: "Run daily ERP sync for organisations with daily frequency (2 AM)"

  erp_scheduled_sync_weekly:
    class: ErpScheduledSyncJob
    queue: erp_sync
    args: [ "weekly" ]
    schedule: "0 3 * * 0"
    description: "Run weekly ERP sync for organisations with weekly frequency (Sunday 3 AM)"

  erp_order_push_retry:
    class: OrderPushRetryJob
    queue: erp_sync
    schedule: "*/15 * * * *"
    description: "Safety-net: retry pending/failed ERP order pushes every 15 minutes"

  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: "12 * * * *"
