production:
  erp_scheduled_sync_hourly:
    class: ErpScheduledSyncJob
    queue: erp_sync
    args: [ "hourly" ]
    schedule: every hour
    description: "Run hourly ERP sync for organisations with hourly frequency"

  erp_scheduled_sync_daily:
    class: ErpScheduledSyncJob
    queue: erp_sync
    args: [ "daily" ]
    schedule: at 2am every day
    description: "Run daily ERP sync for organisations with daily frequency"

  erp_scheduled_sync_weekly:
    class: ErpScheduledSyncJob
    queue: erp_sync
    args: [ "weekly" ]
    schedule: at 3am on Sunday
    description: "Run weekly ERP sync for organisations with weekly frequency"

  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every hour at minute 12
